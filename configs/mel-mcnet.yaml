seed_everything: 2
trainer:
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  devices: 4
  precision: 32
  max_epochs: 50
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 1
  gradient_clip_val: 0.1
  gradient_clip_algorithm: norm
model:
  arch:
    class_path: models.arch.mel_McNet_final.McNet_separation
    init_args:
      # --- Feature extraction ---
      amp_feature_extraction:
        class_path: models.arch.mel_McNet_final.my_linear
        init_args:
          dim_input: 6
          dim_output: 64
          use_bias: true
          use_BN: false
          use_LN: true
          activation: ReLU
      phase_feature_extraction:
        class_path: models.arch.mel_McNet_final.my_linear
        init_args:
          dim_input: 12
          dim_output: 64
          use_bias: true
          use_BN: false
          use_LN: true
          activation: null
      # --- STFT-to-mel projection (FSB + TSB) ---
      stft2mel:
        class_path: models.arch.mel_McNet_final.my_stft2mel
        init_args:
          n_mels: 80
          n_embed: 64
          n_freqs: 257
          sample_rate: 16000
          kernel_size: 3
          stride: 1
          padding: 1
          activation_func:
          - ReLU
          - null
          n_layers: 3
          use_interation:
          - true
          - false
          information_communication_type: attention_like
          mel_scale: htk
      # --- Sequence processing modules ---
      freq:
        class_path: models.arch.mel_McNet_final.RNN_FC
        init_args:
          input_size: 64
          output_size: 64
          hidden_size: 128
          num_layers: 1
          bidirectional: true
          act_funcs:
          - ''
          - ReLU
          use_FC: true
          RNN_type: LSTM
      narr:
        class_path: models.arch.mel_McNet_final.RNN_FC
        init_args:
          input_size: 64
          output_size: 64
          hidden_size: 256
          num_layers: 1
          bidirectional: false
          act_funcs:
          - ''
          - ReLU
          use_FC: true
          RNN_type: LSTM
      sub:
        class_path: models.arch.mel_McNet_final.RNN_FC
        init_args:
          input_size: 327
          output_size: 64
          hidden_size: 384
          num_layers: 1
          bidirectional: false
          act_funcs:
          - ''
          - ReLU
          use_FC: true
          RNN_type: LSTM
      full:
        class_path: models.arch.mel_McNet_final.RNN_FC
        init_args:
          input_size: 70
          output_size: 1
          hidden_size: 128
          num_layers: 1
          bidirectional: true
          act_funcs:
          - ''
          - Sigmoid
          use_FC: true
          RNN_type: LSTM
      # --- Processing order and subband config ---
      order:
      - freq
      - narr
      - sub3+XrMag
      - full4freq+XrMag
      sub_freqs:
      - 3
      - 2
      look_past_and_ahead:
      - 5
      - 0
      ref_channel: 4
      # --- Mel-domain config ---
      use_mel: true
      ref_chn_idx: 4
      use_mel_domain_norm: false
      mel_transfer_type: mel_energy
  channels:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  ref_channel: 4
  vocoder:
    class_path: models.vocos.vocos_online.VOCOS_DECODE
    init_args:
      backbone:
        class_path: models.vocos.vocos_online.VocosBackbone
        init_args:
          input_channels: 80
          dim: 512
          intermediate_dim: 1536
          num_layers: 8
          layer_scale_init_value: null
          adanorm_num_embeddings: null
      head:
        class_path: models.vocos.vocos_online.ISTFTHead
        init_args:
          dim: 512
          n_fft: 512
          hop_length: 128
          padding: center
  vocoder_ckpt: vocos/vocos_checkpoint_epoch=520_step=704392_val_loss=3.6804.ckpt
  stft:
    class_path: models.io.stft.STFT
    init_args:
      n_fft: 512
      n_hop: 128
      win_len: null
      win: hann_window
  norm:
    class_path: models.io.norm.Norm
    init_args:
      mode: cumulative_alpha
  loss:
    class_path: models.io.loss.Loss
    init_args:
      loss_func: models.io.loss.TF_domain_mse
      pit: false
      loss_func_kwargs: {}
  optimizer:
  - Adam
  - lr: 0.001
  lr_scheduler:
  - ExponentialLR
  - gamma: 1
  metrics:
  - SNR
  - SDR
  - SI_SDR
  - NB_PESQ
  - WB_PESQ
  - eSTOI
  - STOI
  - DNSMOS
  val_metric: loss
  write_examples: 200
  ensemble: null
  compile: true
  exp_name: exp
  use_mel: true
  mel_transfer_type: mel_energy
  mel_transfer_eps: 1.0e-10
  use_vocoder: true
  use_non_log_predict_value: true
  use_clip: true
  use_mask: mrm